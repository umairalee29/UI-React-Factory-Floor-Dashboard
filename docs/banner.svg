<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Top accent bar -->
  <rect width="900" height="3" fill="url(#accent)" rx="1"/>

  <!-- Logo hex -->
  <text x="52" y="108" font-family="system-ui,sans-serif" font-size="42" fill="#3b82f6" text-anchor="middle">⬡</text>

  <!-- App name -->
  <text x="90" y="98" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#f1f5f9">OpsFloor</text>
  <text x="90" y="126" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">Factory Floor Dashboard</text>

  <!-- Divider -->
  <line x1="330" y1="60" x2="330" y2="148" stroke="#2d3148" stroke-width="1"/>

  <!-- KPI pills -->
  <!-- OEE -->
  <rect x="356" y="64" width="120" height="52" rx="8" fill="#232636" stroke="#2d3148" stroke-width="1"/>
  <text x="416" y="84" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8" text-anchor="middle">OVERALL OEE</text>
  <text x="416" y="107" font-family="'Courier New',monospace" font-size="22" font-weight="600" fill="#3b82f6" text-anchor="middle">87.4%</text>

  <!-- Running -->
  <rect x="490" y="64" width="120" height="52" rx="8" fill="#232636" stroke="#2d3148" stroke-width="1"/>
  <text x="550" y="84" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8" text-anchor="middle">RUNNING</text>
  <text x="550" y="107" font-family="'Courier New',monospace" font-size="22" font-weight="600" fill="#22c55e" text-anchor="middle">6 / 8</text>

  <!-- Faults -->
  <rect x="624" y="64" width="120" height="52" rx="8" fill="#232636" stroke="#2d3148" stroke-width="1"/>
  <text x="684" y="84" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8" text-anchor="middle">FAULTS</text>
  <text x="684" y="107" font-family="'Courier New',monospace" font-size="22" font-weight="600" fill="#ef4444" text-anchor="middle">2</text>

  <!-- Mini chart bars -->
  <rect x="760" y="104" width="10" height="28" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="774" y="96" width="10" height="36" rx="2" fill="#3b82f6" opacity="0.7"/>
  <rect x="788" y="86" width="10" height="46" rx="2" fill="#3b82f6" opacity="0.85"/>
  <rect x="802" y="92" width="10" height="40" rx="2" fill="#3b82f6"/>
  <rect x="816" y="80" width="10" height="52" rx="2" fill="#3b82f6" opacity="0.9"/>
  <rect x="830" y="72" width="10" height="60" rx="2" fill="url(#accent)"/>
  <text x="848" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#2d3148" text-anchor="middle">OEE trend</text>

  <!-- Status dots row -->
  <circle cx="356" cy="152" r="5" fill="#22c55e"/>
  <text x="367" y="157" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Running</text>
  <circle cx="430" cy="152" r="5" fill="#f59e0b"/>
  <text x="441" y="157" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Idle</text>
  <circle cx="488" cy="152" r="5" fill="#ef4444"/>
  <text x="499" y="157" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Fault</text>
  <text x="570" y="157" font-family="system-ui,sans-serif" font-size="11" fill="#2d3148">• Live via Socket.io • JWT Auth • Role-based</text>
</svg>
